name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build


      - name: Ensure CF Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: CLOUDFLARE_ACCOUNT_ID=711c2e12a6bd9cec3ec5c6a7633f147c npx -y wrangler@3 pages project create equipo-de-seguridad-industrial-com --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 711c2e12a6bd9cec3ec5c6a7633f147c
          command: pages deploy dist --project-name=equipo-de-seguridad-industrial-com --branch=main
